    <style>

/*
GLOBAL
*/

@-ms-viewport{
  width: device-width;
}

html, body {
  height: 100%;
}
body {
  position: absolute;
  margin: 0;
  padding: 0;
  width: 100%;
  font-family: 'Roboto', sans-serif;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -khtml-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: none;
  letter-spacing: 1px;
  overflow: hidden;
  -webkit-overflow-scrolling: touch;
  background-color: #000;
  font-family: 'Open Sans', sans-serif;
  font-weight: 300;
}

::-webkit-scrollbar { 
    display: none; 
}

canvas {
  z-index: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  -webkit-transform: translateX( -50% ) translateY( -50% );
  transform: translateX( -50% ) translateY( -50% );
}

#load {
  z-index: 1;
  position: absolute;
  bottom: 0;
  height: 5px;
  background-color: #fff;
  -webkit-transform: translateY( 0 );
  transform: translateY( 0 );
  -webkit-transition: -webkit-transform 200ms;
  transition: transform 200ms;
}



@keyframes bounce {
  0%, 20%, 50%, 80%, 100% {
    transform: translateY(0);
  }
  40% {
    transform: translateY(-10px);
  }
  60% {
    transform: translateY(-5px);
  }
}

#reminder {
  z-index: 2;
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: rgba( 255, 255, 255, 0.8 );
  font-weight: 300;
  font-style: italic;
  opacity: 0;
  animation: bounce 2000ms infinite;
  transition: opacity 1000ms;
}

#maximum {
  z-index: 2;
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: rgba( 255, 255, 255, 0.8 );
  font-weight: 300;
  font-style: italic;
  opacity: 0;
  transition: opacity 1000ms;
}

.zoom {
  cursor: pointer;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  z-index: 3;
  box-sizing: border-box;
  border: 2px solid #fff;
  color: #fff;
  background-color: rgba( 255, 255, 255, 0.0 );
  opacity: 0;
  transition: opacity 400ms;
}
.zoom:hover {
  border-width: 0;
  color: #000;
  background-color: #fff;
}

.zoom-label {
  position: absolute;
  top: 50%;
  left: 50%;
  font-size: 28px;
  transform: translateX( -50% ) translateY( -50% );
}
#zoom-in {
  position: absolute;
  bottom: 15px;
  right: 65px;
}
#zoom-out {
  position: absolute;
  bottom: 15px;
  right: 15px;
}

    </style>

  </head>
  <body>

<div id="load"></div>

<div id="reminder">click and drag to zoom in</div>

<div id="maximum">that's as far as you can zoom in</div>

<div class="zoom" id="zoom-in">
  <div class="zoom-label">&plus;</div>
</div>
<div class="zoom" id="zoom-out">
  <div class="zoom-label">&minus;</div>
</div>
